<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7c5cfc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Word">
  <link rel="icon" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="manifest" href="/manifest.json">
  <title>Word</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #222240;
      --accent: #7c5cfc;
      --accent2: #c084fc;
      --text: #eee;
      --text2: #aaa;
      --radius: 16px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: calc(20px + var(--safe-top)) 16px calc(20px + var(--safe-bottom));
      -webkit-font-smoothing: antialiased;
    }

    header {
      text-align: center;
      padding: 24px 0 8px;
    }
    header h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { color: var(--text2); font-size: 0.9rem; margin-top: 4px; }

    .tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 16px 0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 99px;
      border: none;
      background: var(--surface);
      color: var(--text2);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
    }

    .word-display {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .definition { color: var(--text2); line-height: 1.5; font-size: 0.95rem; }
    .date-badge {
      display: inline-block;
      background: var(--surface2);
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 0.75rem;
      color: var(--text2);
      margin-bottom: 12px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.8; }
    .btn:disabled { opacity: 0.5; }

    .input-group { margin-bottom: 14px; }
    .input-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--text2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 2px solid var(--surface2);
      background: var(--surface2);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }

    .result-card {
      background: var(--surface2);
      border-radius: 12px;
      padding: 16px;
      margin-top: 14px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .stat-row:last-child { border: none; }
    .stat-label { color: var(--text2); font-size: 0.9rem; }
    .stat-value { font-weight: 600; font-size: 0.9rem; }

    .anagram-result {
      text-align: center;
      padding: 20px;
      font-size: 1.2rem;
      font-weight: 700;
    }
    .anagram-yes { color: #4ade80; }
    .anagram-no { color: #f87171; }

    .word-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .word-chip {
      padding: 6px 14px;
      background: var(--surface2);
      border-radius: 99px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .word-chip:active { background: var(--accent); }

    .search-results { margin-top: 14px; }
    .search-results .word-chip { margin-bottom: 4px; }

    .loading {
      text-align: center;
      padding: 20px;
      color: var(--text2);
    }
    .loading::after {
      content: "";
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid var(--text2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-left: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .freq-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
    }
    .freq-letter {
      width: 24px;
      text-align: center;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--accent2);
    }
    .freq-bar {
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.4s ease;
    }
    .freq-count { font-size: 0.8rem; color: var(--text2); width: 20px; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text2);
    }
    .empty-state .emoji { font-size: 2rem; margin-bottom: 8px; }
  </style>
</head>
<body>

<header>
  <h1>Word</h1>
  <p>tap around, discover words 💜</p>
</header>

<nav class="tabs" id="tabs">
  <button class="tab active" data-panel="discover">Discover</button>
  <button class="tab" data-panel="stats">Stats</button>
  <button class="tab" data-panel="anagram">Anagram</button>
  <button class="tab" data-panel="search">Search</button>
  <button class="tab" data-panel="browse">Browse</button>
</nav>

<!-- DISCOVER -->
<section class="panel active" id="panel-discover">
  <div class="card" id="wotd-card">
    <div class="loading">loading</div>
  </div>
  <button class="btn" id="random-btn">Random Word</button>
  <div id="random-result"></div>
</section>

<!-- STATS -->
<section class="panel" id="panel-stats">
  <div class="card">
    <div class="input-group">
      <label>Enter any word</label>
      <input type="text" id="stats-input" placeholder="e.g. racecar" autocomplete="off" autocapitalize="none">
    </div>
    <button class="btn" id="stats-btn">Analyze</button>
  </div>
  <div id="stats-result"></div>
</section>

<!-- ANAGRAM -->
<section class="panel" id="panel-anagram">
  <div class="card">
    <div class="input-group">
      <label>First word</label>
      <input type="text" id="ana-word1" placeholder="listen" autocomplete="off" autocapitalize="none">
    </div>
    <div class="input-group">
      <label>Second word</label>
      <input type="text" id="ana-word2" placeholder="silent" autocomplete="off" autocapitalize="none">
    </div>
    <button class="btn" id="ana-btn">Check</button>
  </div>
  <div id="ana-result"></div>
</section>

<!-- SEARCH -->
<section class="panel" id="panel-search">
  <div class="card">
    <div class="input-group">
      <label>Search for letters or patterns</label>
      <input type="text" id="search-input" placeholder="e.g. light" autocomplete="off" autocapitalize="none">
    </div>
    <button class="btn" id="search-btn">Search</button>
  </div>
  <div id="search-result"></div>
</section>

<!-- BROWSE -->
<section class="panel" id="panel-browse">
  <div class="card">
    <p style="color:var(--text2);font-size:0.9rem;margin-bottom:8px">All words &middot; tap one for its definition</p>
    <div class="word-grid" id="browse-grid">
      <div class="loading">loading</div>
    </div>
  </div>
  <div id="browse-detail"></div>
</section>

<script>
  const API = "";

  async function api(path) {
    const res = await fetch(API + path);
    return res.ok ? res.json() : Promise.reject(await res.json());
  }

  // --- Tabs ---
  const tabs = document.querySelectorAll(".tab");
  const panels = document.querySelectorAll(".panel");
  tabs.forEach(t => t.addEventListener("click", () => {
    tabs.forEach(x => x.classList.remove("active"));
    panels.forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    document.getElementById("panel-" + t.dataset.panel).classList.add("active");
  }));

  // --- Word of the Day ---
  (async () => {
    try {
      const data = await api("/words/today");
      document.getElementById("wotd-card").innerHTML = `
        <div class="date-badge">word of the day &middot; ${data.date}</div>
        <div class="word-display">${data.word}</div>
        <div class="definition">${data.definition || ""}</div>
      `;
    } catch {
      document.getElementById("wotd-card").innerHTML = `<div class="empty-state"><div class="emoji">😵</div>could not load</div>`;
    }
  })();

  // --- Random ---
  document.getElementById("random-btn").addEventListener("click", async () => {
    const btn = document.getElementById("random-btn");
    btn.disabled = true;
    try {
      const data = await api("/words/random");
      document.getElementById("random-result").innerHTML = `
        <div class="card" style="margin-top:14px">
          <div class="word-display">${data.word}</div>
          <div class="definition">${data.definition || "no definition available"}</div>
        </div>
      `;
    } catch { }
    btn.disabled = false;
  });

  // --- Stats ---
  document.getElementById("stats-btn").addEventListener("click", async () => {
    const word = document.getElementById("stats-input").value.trim();
    if (!word) return;
    try {
      const d = await api("/words/stats/" + encodeURIComponent(word));
      const maxFreq = Math.max(...Object.values(d.frequency));
      const bars = Object.entries(d.frequency)
        .sort((a, b) => b[1] - a[1])
        .map(([ch, n]) => `
          <div class="freq-bar-wrap">
            <span class="freq-letter">${ch}</span>
            <div style="flex:1;background:var(--surface);border-radius:4px;overflow:hidden">
              <div class="freq-bar" style="width:${(n / maxFreq) * 100}%"></div>
            </div>
            <span class="freq-count">${n}</span>
          </div>
        `).join("");

      document.getElementById("stats-result").innerHTML = `
        <div class="result-card">
          <div class="word-display" style="font-size:1.4rem;margin-bottom:12px">${d.word}</div>
          <div class="stat-row"><span class="stat-label">Length</span><span class="stat-value">${d.length}</span></div>
          <div class="stat-row"><span class="stat-label">Vowels</span><span class="stat-value">${d.vowels}</span></div>
          <div class="stat-row"><span class="stat-label">Consonants</span><span class="stat-value">${d.consonants}</span></div>
          <div class="stat-row"><span class="stat-label">Unique letters</span><span class="stat-value">${d.unique_letters}</span></div>
          <div class="stat-row"><span class="stat-label">Reversed</span><span class="stat-value">${d.reversed}</span></div>
          <div class="stat-row"><span class="stat-label">Palindrome?</span><span class="stat-value">${d.is_palindrome ? "Yes!" : "No"}</span></div>
          <div style="margin-top:12px">
            <span class="stat-label">Letter frequency</span>
            <div style="margin-top:8px">${bars}</div>
          </div>
        </div>
      `;
    } catch {
      document.getElementById("stats-result").innerHTML = `<div class="result-card empty-state">something went wrong</div>`;
    }
  });
  document.getElementById("stats-input").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("stats-btn").click(); });

  // --- Anagram ---
  document.getElementById("ana-btn").addEventListener("click", async () => {
    const w1 = document.getElementById("ana-word1").value.trim();
    const w2 = document.getElementById("ana-word2").value.trim();
    if (!w1 || !w2) return;
    try {
      const d = await api(`/words/anagram/${encodeURIComponent(w1)}/${encodeURIComponent(w2)}`);
      document.getElementById("ana-result").innerHTML = `
        <div class="result-card anagram-result ${d.are_anagrams ? "anagram-yes" : "anagram-no"}">
          ${d.are_anagrams ? "Yes! They're anagrams" : "Nope, not anagrams"}
        </div>
      `;
    } catch { }
  });
  document.getElementById("ana-word2").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("ana-btn").click(); });

  // --- Search ---
  document.getElementById("search-btn").addEventListener("click", async () => {
    const q = document.getElementById("search-input").value.trim();
    if (!q) return;
    try {
      const d = await api("/words/search?q=" + encodeURIComponent(q));
      if (d.results.length === 0) {
        document.getElementById("search-result").innerHTML = `<div class="result-card empty-state"><div class="emoji">🤷</div>no matches</div>`;
        return;
      }
      const chips = d.results.map(w => `<span class="word-chip" onclick="showDef('${w}')">${w}</span>`).join("");
      document.getElementById("search-result").innerHTML = `
        <div class="result-card">
          <span class="stat-label">${d.count} result${d.count !== 1 ? "s" : ""}</span>
          <div class="word-grid" style="margin-top:8px">${chips}</div>
        </div>
      `;
    } catch { }
  });
  document.getElementById("search-input").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("search-btn").click(); });

  // --- Browse ---
  (async () => {
    try {
      const d = await api("/words/all");
      const chips = d.words.map(w => `<span class="word-chip" onclick="showDef('${w}')">${w}</span>`).join("");
      document.getElementById("browse-grid").innerHTML = chips;
    } catch {
      document.getElementById("browse-grid").innerHTML = `<div class="empty-state">could not load words</div>`;
    }
  })();

  // --- Show definition (shared) ---
  async function showDef(word) {
    try {
      const d = await api("/words/define/" + encodeURIComponent(word));
      document.getElementById("browse-detail").innerHTML = `
        <div class="card" style="margin-top:14px">
          <div class="word-display">${d.word}</div>
          <div class="definition">${d.definition}</div>
        </div>
      `;
    } catch {
      document.getElementById("browse-detail").innerHTML = `
        <div class="card" style="margin-top:14px">
          <div class="word-display">${word}</div>
          <div class="definition" style="color:var(--text2)">no definition available</div>
        </div>
      `;
    }
  }
</script>

</body>
</html>
